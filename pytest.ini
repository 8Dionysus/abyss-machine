[pytest]
testpaths = tests/public_smoke
python_files = test_*.py
addopts = --strict-markers
markers =
    quick: deterministic tests safe for default local runs
    full: broader non-mutating tests that may inspect installed host contracts
    live: read-only checks against current machine state and generated evidence
    long: slow or resource-sensitive checks, never part of quick/full by default
    manual: requires operator decision, credentials, live mutation, or service restart
    contract: CLI, JSON, bridge, and file-shape contract tests
    safety: host boundary, dry-run, and non-mutation regression tests
    regression: bug-prevention fixtures for previous host failures
    host_drift: checks that depend on the installed workstation state
    bootstrap: portable bootstrap smoke tests
