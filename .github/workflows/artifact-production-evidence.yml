name: Artifact Production Evidence

on:
  workflow_dispatch:
    inputs:
      artifact:
        description: Public-safe artifact class to package and attest
        required: true
        type: choice
        default: bootstrap_install_bundle
        options:
          - bootstrap_install_bundle

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bootstrap_install_bundle:
    name: Bootstrap Install Bundle Evidence
    if: ${{ inputs.artifact == 'bootstrap_install_bundle' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run release artifact gate
        run: python scripts/ci_gate.py --mode release-artifact

      - name: Build deterministic bootstrap archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          artifact="dist/abyss-machine-bootstrap-${GITHUB_SHA}.tar.gz"
          tar --sort=name --mtime=@0 --owner=0 --group=0 --numeric-owner \
            -czf "${artifact}" \
            scripts/abyss-machine-bootstrap \
            src/abyss_machine \
            config-templates \
            systemd \
            schemas/bootstrap-report.schema.json \
            manifests/bootstrap_profiles.manifest.json
          sha256sum "${artifact}" > "${artifact}.sha256"

      - name: Upload bootstrap archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: abyss-machine-bootstrap-${{ github.sha }}
          path: |
            dist/abyss-machine-bootstrap-${{ github.sha }}.tar.gz
            dist/abyss-machine-bootstrap-${{ github.sha }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Attest bootstrap archive
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: dist/abyss-machine-bootstrap-${{ github.sha }}.tar.gz
